name: Release

# Build binaries, attach them to the GitHub release, and publish the npm
# packages when a version tag is pushed, e.g.:
#   git tag v0.5.2 && git push origin v0.5.2
#
# npm publishing needs an NPM_TOKEN repo secret (an npm automation token).
# The binary release works without it; only the `npm` job needs it.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          dir="target/${{ matrix.target }}/release"
          tar -C "$dir" -czf "termem-${{ matrix.target }}.tar.gz" termem
          shasum -a 256 "termem-${{ matrix.target }}.tar.gz" > "termem-${{ matrix.target }}.tar.gz.sha256"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            termem-${{ matrix.target }}.tar.gz
            termem-${{ matrix.target }}.tar.gz.sha256
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: termem-${{ matrix.target }}.tar.gz

  npm:
    name: npm publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true
      - name: Publish to npm
        run: bash npm/publish.sh "${GITHUB_REF_NAME#v}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
