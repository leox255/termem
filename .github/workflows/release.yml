name: Release

# Build and attach binaries when a version tag is pushed, e.g.:
#   git tag v0.5.2 && git push origin v0.5.2

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: |
          dir="target/${{ matrix.target }}/release"
          tar -C "$dir" -czf "termem-${{ matrix.target }}.tar.gz" termem
          shasum -a 256 "termem-${{ matrix.target }}.tar.gz" > "termem-${{ matrix.target }}.tar.gz.sha256"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            termem-${{ matrix.target }}.tar.gz
            termem-${{ matrix.target }}.tar.gz.sha256
