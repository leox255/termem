name: Release

# Build binaries, attach them to the GitHub release, and publish the npm
# packages when a version tag is pushed, e.g.:
#   git tag v0.5.2 && git push origin v0.5.2
#
# npm publishing uses OIDC trusted publishing (no NPM_TOKEN secret). Each npm
# package needs a one-time trusted-publisher setup; see DISTRIBUTION.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Single source of truth for the release version: Cargo.toml. The crates.io
  # publish and the binary's --version already come from it; this job makes npm
  # and the MCP manifest follow, and fails the whole release fast if the git tag
  # or server.json disagree (so you only ever edit the version in Cargo.toml).
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$ver" != "$tag" ]; then
            echo "::error::git tag v$tag does not match Cargo.toml version $ver"; exit 1
          fi
          srv="$(grep -m1 '"version"' server.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
          if [ "$ver" != "$srv" ]; then
            echo "::error::server.json version $srv does not match Cargo.toml version $ver"; exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Release version $ver — tag, Cargo.toml, and server.json all agree."

  build:
    name: ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin, bin: termem }
          # Cross-compile the Intel-mac binary on Apple Silicon: GitHub's
          # Intel (macos-13) runners are scarce and can queue for hours.
          - { os: macos-14, target: x86_64-apple-darwin, bin: termem }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, bin: termem }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, bin: termem }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, bin: termem.exe }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          dir="target/${{ matrix.target }}/release"
          f="termem-${{ matrix.target }}.tar.gz"
          tar -C "$dir" -czf "$f" "${{ matrix.bin }}"
          # macOS/Linux have shasum; Windows Git Bash has sha256sum instead.
          if command -v shasum >/dev/null; then shasum -a 256 "$f" > "$f.sha256"; else sha256sum "$f" > "$f.sha256"; fi
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            termem-${{ matrix.target }}.tar.gz
            termem-${{ matrix.target }}.tar.gz.sha256
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: termem-${{ matrix.target }}.tar.gz

  npm:
    name: npm publish
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for npm trusted publishing (no NPM_TOKEN)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24   # ships npm 11; OIDC needs npm >= 11.5.1. No registry-url (that wants a token).
      - name: Use a trusted-publishing-capable npm
        run: npm install -g npm@latest
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true
      - name: Publish to npm (OIDC trusted publishing)
        run: bash npm/publish.sh "${{ needs.version.outputs.version }}"
        env:
          NPM_CONFIG_PROVENANCE: "true"
