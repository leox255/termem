<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Even — the terminal-first workspace</title>
    <meta
      name="description"
      content="Even is a terminal-first workspace. Your terminal, browser, editor, and coding agents in one window."
    />
    <meta name="color-scheme" content="dark light" />
    <script>
      // Set theme before paint to avoid a flash. Default dark (terminal tool);
      // honor a stored choice, else fall back to system preference.
      try {
        var t = localStorage.getItem("even-theme");
        var dark = t ? t === "dark" : !window.matchMedia("(prefers-color-scheme: light)").matches;
        document.documentElement.classList.toggle("dark", dark);
      } catch (e) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
